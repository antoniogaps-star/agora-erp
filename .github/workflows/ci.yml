name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agora
          POSTGRES_PASSWORD: agora
          POSTGRES_DB: agora_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U agora -d agora_test"
          --health-interval 5s --health-timeout 5s --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy app
      - run: pytest
        env:
          APP_ENV: test
          # La app usa el rol NO superusuario (creado por los fixtures) para que RLS aísle.
          DATABASE_URL: postgresql+asyncpg://agora_app:agora_app@localhost:5432/agora_test
          # Las migraciones usan el rol dueño.
          MIGRATION_DATABASE_URL: postgresql+asyncpg://agora:agora@localhost:5432/agora_test
          JWT_SECRET: ci-test-secret

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test --if-present

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
